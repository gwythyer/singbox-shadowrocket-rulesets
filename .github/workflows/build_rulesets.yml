name: Build rule-sets (srs + list)

on:
  push:
    paths:
      - ".github/workflows/build_rulesets.yml"
      - "rulesets/source/direct/**/*.txt"
      - "rulesets/source/proxy/**/*.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set timestamps
        run: |
          echo "TS_TAG=$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
          echo "TS_NAME=$(date -u +'%d.%m.%Y — %H:%M:%S UTC')" >> $GITHUB_ENV

      - name: Download sing-box
        run: |
          set -euo pipefail
          VERSION=1.12.17
          wget -q https://github.com/SagerNet/sing-box/releases/download/v$VERSION/sing-box-$VERSION-linux-amd64.tar.gz
          tar -xzf sing-box-$VERSION-linux-amd64.tar.gz
          mv sing-box-$VERSION-linux-amd64/sing-box ./sing-box
          chmod +x ./sing-box
          ./sing-box version

      # 1) Precheck источников + сборка агрегатов (direct-domains/proxy-domains)
      - name: Precheck sources & build aggregated domain lists (fail on empty)
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p .tmp

          for dir in direct proxy; do
            files=(rulesets/source/${dir}/*.txt)

            if [ ${#files[@]} -eq 0 ]; then
              echo "ERROR: No source files found in rulesets/source/${dir}/*.txt"
              exit 1
            fi

            # Проверяем, что каждый файл содержит хотя бы 1 домен (не пустой и не только комменты)
            for f in "${files[@]}"; do
              if ! grep -qE '^[^#[:space:]]' "$f"; then
                echo "ERROR: Empty ruleset source file (or comments/whitespace only): $f"
                exit 1
              fi
            done

            # Собираем агрегированный список доменов (уникальные, отсортированные)
            agg=".tmp/${dir}-domains.txt"
            : > "$agg"
            for f in "${files[@]}"; do
              grep -E '^[^#[:space:]]' "$f" >> "$agg"
            done
            sort -u "$agg" -o "$agg"

            # Доп. защита: агрегат не должен быть пустым
            if [ ! -s "$agg" ]; then
              echo "ERROR: Aggregated list is empty (unexpected): $agg"
              exit 1
            fi

            echo "Aggregated ${dir}: $(wc -l < "$agg") domains -> $agg"
          done

      # 2) Shadowrocket .list (по каждому файлу + агрегаты)
      - name: Generate Shadowrocket .list (fail on empty)
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p rulesets/shadowrocket/direct rulesets/shadowrocket/proxy

          for dir in direct proxy; do
            # per-file
            for f in rulesets/source/${dir}/*.txt; do
              base=$(basename "$f" .txt)
              name="${dir}-${base}"
              out="rulesets/shadowrocket/${dir}/${name}.list"
              echo "# ${name}" > "$out"
              grep -E '^[^#[:space:]]' "$f" | sed 's/^/DOMAIN-SUFFIX,/' >> "$out"
            done

            # aggregated
            agg=".tmp/${dir}-domains.txt"
            out="rulesets/shadowrocket/${dir}/${dir}-domains.list"
            echo "# ${dir}-domains" > "$out"
            sed 's/^/DOMAIN-SUFFIX,/' "$agg" >> "$out"
          done

      # 3) sing-box JSON (по каждому файлу + агрегаты)
      - name: Generate sing-box JSON (fail on empty)
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p rulesets/singbox/direct rulesets/singbox/proxy

          make_json () {
            local src="$1"
            local dst="$2"
            {
              echo '{ "version": 1, "rules": [ { "domain_suffix": ['
              # src уже отфильтрован на этапе подготовки/grep, но на всякий:
              grep -E '^[^#[:space:]]' "$src" | sed 's/.*/"&",/' | sed '$ s/,$//'
              echo '] } ] }'
            } > "$dst"
          }

          for dir in direct proxy; do
            # per-file
            for f in rulesets/source/${dir}/*.txt; do
              base=$(basename "$f" .txt)
              name="${dir}-${base}"
              json="rulesets/singbox/${dir}/${name}.json"
              make_json "$f" "$json"
            done

            # aggregated
            agg=".tmp/${dir}-domains.txt"
            json="rulesets/singbox/${dir}/${dir}-domains.json"
            make_json "$agg" "$json"
          done

      - name: Validate sing-box JSON
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in rulesets/singbox/direct/*.json rulesets/singbox/proxy/*.json; do
            jq empty "$f"
          done

      # 4) Compile SRS (включая direct-domains/proxy-domains)
      - name: Compile SRS
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p build/direct build/proxy

          for dir in direct proxy; do
            for f in rulesets/singbox/${dir}/*.json; do
              echo "Compiling $f"
              ./sing-box rule-set compile "$f"

              srs="${f%.json}.srs"
              if [ ! -s "$srs" ]; then
                echo "ERROR: $srs is empty or missing"
                exit 1
              fi

              mv "$srs" "build/${dir}/"
            done
          done

      - name: Append custom mixed rules to proxy-domains.list
        run: |
          set -euo pipefail
      
          FILE="rulesets/shadowrocket/proxy/proxy-domains.list"
          TMP="$(mktemp)"
      
          awk '
            BEGIN {skip=0}
            /^# BEGIN CUSTOM MIXED RULES$/ {skip=1; next}
            /^# END CUSTOM MIXED RULES$/   {skip=0; next}
            skip==0 {print}
          ' "$FILE" > "$TMP"
      
          cat >> "$TMP" <<'EOF'
      
          # BEGIN CUSTOM MIXED RULES
          DOMAIN,api.imem.app
          DOMAIN,api.swiftgram.app
          DOMAIN-KEYWORD,nicegram
          IP-CIDR,109.239.140.0/24,no-resolve
          IP-CIDR,139.59.210.98/32,no-resolve
          IP-CIDR,149.154.160.0/20,no-resolve
          IP-CIDR,196.55.216.167/32,no-resolve
          IP-CIDR,2001:67c:4e8::/48,no-resolve
          IP-CIDR,2001:b28:f23c::/47,no-resolve
          IP-CIDR,2001:b28:f23f::/48,no-resolve
          IP-CIDR,2a0a:f280::/29,no-resolve
          IP-CIDR,5.28.192.0/18,no-resolve
          IP-CIDR,91.108.0.0/16,no-resolve
          IP-ASN,211157,no-resolve
          IP-ASN,44907,no-resolve
          IP-ASN,59930,no-resolve
          IP-ASN,62014,no-resolve
          IP-ASN,62041,no-resolve
          # END CUSTOM MIXED RULES
          EOF
      
          mv "$TMP" "$FILE"
      
          echo "Updated $FILE"
          tail -n 30 "$FILE"

      - name: Copy generated .list to shadowrocket/lists
        run: |
          set -euo pipefail
      
          mkdir -p shadowrocket/lists
          find shadowrocket/lists -type f -name "*.list" -delete
          find rulesets/shadowrocket -type f -name "*.list" -exec cp {} shadowrocket/lists/ \;
      
          echo "Copied files:"
          ls -la shadowrocket/lists

      - name: Commit .list to main
        run: |
          set -euo pipefail
      
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
          git add shadowrocket/lists/*.list
      
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
      
          git commit -m "chore: update shadowrocket lists [skip ci]"
          git push origin HEAD:main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ env.TS_TAG }}-${{ github.run_id }}
          name: Автосборка от ${{ env.TS_NAME }}
          body_path: RELEASE.md
          make_latest: true
          files: |
            build/direct/direct-*.srs
            build/proxy/proxy-*.srs
            rulesets/shadowrocket/direct/direct-*.list
            rulesets/shadowrocket/proxy/proxy-*.list
            singbox/*.json
            shadowrocket/*.conf
